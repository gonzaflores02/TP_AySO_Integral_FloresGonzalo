---
- name: "Actualizo cache en Debian/Ubuntu"
  become: yes
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "Instalo herramientas"
  become: yes
  package:
    name:
      - htop
      - tmux
      - speedtest-cli
    state: present
  ignore_errors: yes
